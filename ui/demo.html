<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>Subtitle Sidekick — Demo</title>
  <style>
    :root { --demo-accent: #c56a43; }
    html, body { margin: 0; height: 100%; background: #0e0b08; overflow: hidden; font-family: "Rubik", system-ui, Arial, sans-serif; }
    /* stage holds the scaled app + the cursor together, so zoom keeps the cursor aligned */
    .stage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .zoomer {
      position: relative; width: 860px; height: 680px;
      transition: transform 0.85s cubic-bezier(0.5, 0, 0.15, 1);
      transform-origin: 50% 50%;
    }
    .zoomer iframe { width: 860px; height: 680px; border: 0; border-radius: 14px; background: #14100b; box-shadow: 0 30px 90px rgba(0,0,0,0.6); }
    /* fake cursor */
    .cursor {
      position: absolute; top: 0; left: 0; width: 22px; height: 22px; z-index: 20; pointer-events: none;
      transition: left 0.7s cubic-bezier(0.5,0,0.15,1), top 0.7s cubic-bezier(0.5,0,0.15,1), transform 0.12s ease;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
    }
    .cursor svg { display: block; }
    .cursor.tap { transform: scale(0.8); }
    /* click ripple */
    .ripple { position: absolute; z-index: 19; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--demo-accent); pointer-events: none; opacity: 0; }
    .ripple.go { animation: ripple 0.5s ease-out; }
    @keyframes ripple { from { opacity: 0.9; transform: scale(0.4); } to { opacity: 0; transform: scale(4); } }
    /* caption bar */
    .caption {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(12px);
      z-index: 30; background: rgba(18, 13, 9, 0.82); color: #fff; backdrop-filter: blur(6px);
      padding: 12px 24px; border-radius: 999px; font-size: 18px; font-weight: 600; letter-spacing: 0.01em;
      opacity: 0; transition: opacity 0.4s ease, transform 0.4s ease; white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .caption.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .caption .dot { color: var(--demo-accent); margin-inline-start: 8px; }
    /* intro / outro card */
    .card {
      position: absolute; inset: 0; z-index: 40; display: flex; flex-direction: column; gap: 14px;
      align-items: center; justify-content: center; background: radial-gradient(120% 90% at 50% 0%, #241a12, #0e0b08);
      color: #fff; opacity: 0; transition: opacity 0.6s ease; pointer-events: none;
    }
    .card.show { opacity: 1; }
    .card .logo { font-size: 44px; font-weight: 800; letter-spacing: -0.03em; }
    .card .tag { font-size: 18px; color: #cbb79f; }
    .card .accent { color: var(--demo-accent); }
    .replay {
      position: absolute; top: 16px; left: 16px; z-index: 50; background: rgba(255,255,255,0.1); color: #fff;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; padding: 8px 16px; font-family: inherit;
      font-size: 13px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="zoomer" id="zoomer">
      <iframe id="app" src="index.html?demo=1"></iframe>
      <div class="ripple" id="ripple"></div>
      <div class="cursor" id="cursor">
        <svg width="22" height="22" viewBox="0 0 22 22"><path d="M2 2l6 16 2.5-6.5L17 9 2 2z" fill="#fff" stroke="#1a1a1a" stroke-width="1.2" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </div>
  <div class="caption" id="caption"></div>
  <div class="card show" id="intro">
    <div class="logo">🎬 Subtitle <span class="accent">Sidekick</span></div>
    <div class="tag">תמלול הרצאות לעברית — כתוביות מסונכרנות, פרטי ומקומי</div>
  </div>
  <div class="card" id="outro">
    <div class="logo">Subtitle <span class="accent">Sidekick</span></div>
    <div class="tag">מקומי · פרטי · חינמי — עם שרת GPU אישי אופציונלי</div>
  </div>
  <button class="replay" id="replay" hidden onclick="location.reload()">↻ הרצה מחדש</button>

  <script>
    const iframe = document.getElementById("app");
    const zoomer = document.getElementById("zoomer");
    const cursor = document.getElementById("cursor");
    const ripple = document.getElementById("ripple");
    const cap = document.getElementById("caption");
    const wait = (ms) => new Promise((r) => setTimeout(r, ms));
    async function waitFor(fn, timeout = 12000) {
      const t0 = Date.now();
      while (Date.now() - t0 < timeout) { if (fn()) return true; await wait(150); }
      return false;
    }
    const doc = () => iframe.contentDocument;
    const win = () => iframe.contentWindow;

    function center(el) {
      const r = el.getBoundingClientRect();               // relative to iframe viewport = zoomer coords
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }
    function moveTo(el) {
      const c = center(el);
      cursor.style.left = (c.x - 4) + "px";
      cursor.style.top = (c.y - 2) + "px";
    }
    async function click(el) {
      if (!el) return;
      moveTo(el); await wait(720);
      const c = center(el);
      ripple.style.left = (c.x - 5) + "px"; ripple.style.top = (c.y - 5) + "px";
      ripple.classList.remove("go"); void ripple.offsetWidth; ripple.classList.add("go");
      cursor.classList.add("tap"); await wait(120); cursor.classList.remove("tap");
      el.click();
    }
    function zoomTo(el, scale) {
      if (!el) { zoomer.style.transformOrigin = "50% 50%"; zoomer.style.transform = "scale(1)"; return; }
      const c = center(el);
      zoomer.style.transformOrigin = `${(c.x / 860) * 100}% ${(c.y / 680) * 100}%`;
      zoomer.style.transform = `scale(${scale})`;
    }
    function resetZoom() { zoomer.style.transformOrigin = "50% 50%"; zoomer.style.transform = "scale(1)"; }
    async function caption(text) {
      cap.classList.remove("show"); await wait(280);
      cap.innerHTML = text + '<span class="dot">●</span>';
      cap.classList.add("show");
    }
    const id = (x) => doc().getElementById(x);

    // fake player playback (no real video file in demo) — drive captions + progress from the cues
    function playFake(seconds) {
      const cues = win().__demoCues || [];
      const total = cues.length ? cues[cues.length - 1].end : 21;
      let t = 0; const step = 0.45;
      const rows = doc().querySelectorAll(".tc-row");
      const timer = setInterval(() => {
        t += step; if (t > total) t = 0;
        const ci = cues.findIndex((c) => t >= c.start && t <= c.end);
        if (id("subline")) id("subline").textContent = ci >= 0 ? cues[ci].text : "";
        if (id("pfill")) id("pfill").style.width = (t / total * 100) + "%";
        rows.forEach((r, i) => r.classList.toggle("cur", i === ci));
      }, 120);
      return new Promise((r) => setTimeout(() => { clearInterval(timer); r(); }, seconds * 1000));
    }

    async function run() {
      await new Promise((r) => { if (doc() && doc().readyState === "complete") r(); else iframe.addEventListener("load", r, { once: true }); });
      await wait(600);
      doc().body.classList.add("demo-mode");
      document.getElementById("intro").classList.add("show");
      await wait(2200);
      document.getElementById("intro").classList.remove("show");

      // 1) home dashboard
      await caption("מסך הבית — הכול במבט אחד");
      await wait(400); zoomTo(doc().querySelector(".widgets"), 1.25); await wait(1900); resetZoom(); await wait(700);

      // 2) light ↔ dark
      await caption("מצב כהה ובהיר");
      await click(id("themeBtn")); await wait(1400);
      await click(id("themeBtn")); await wait(900);

      // 3) start a new transcription
      await caption("העלאת הרצאה חדשה");
      await click(id("heroFile")); await wait(1100);

      // 4) choose mode + language (GPU-first)
      await caption("תמלול מהיר בשרת GPU אישי");
      zoomTo(id("modeSel"), 1.3); moveTo(id("modeSel")); await wait(2000); resetZoom(); await wait(600);

      // 5) pick a file → processing
      await caption("תמלול אוטומטי — מסונכרן לשנייה");
      await click(id("pickBtn"));
      await waitFor(() => id("watchDone") && !id("watchDone").hidden);   // watch progress, then wait for "ready"
      await wait(700);

      // 6) open the player
      await click(id("watchDone"));
      await waitFor(() => { const v = id("view-play"); return v && !v.hidden; });
      await wait(700);

      // 7) captions playing
      await caption("צפייה עם כתוביות בעברית — גם במסך מלא");
      await playFake(6.5);

      // 8) search inside the transcript
      await caption("חיפוש בתוך התמליל");
      const s = id("tcSearch");
      if (s) { moveTo(s); await wait(600); s.focus();
        for (const ch of "נגזרת") { s.value += ch; s.dispatchEvent(new Event("input", { bubbles: true })); await wait(160); } }
      await wait(2200);

      // outro
      cap.classList.remove("show");
      document.getElementById("outro").classList.add("show");
      await wait(400);
      document.getElementById("replay").hidden = false;
    }
    run();
  </script>
</body>
</html>
